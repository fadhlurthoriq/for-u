<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>❤️ For U</title>

    <!-- FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/animations.css">

    <link rel="stylesheet" href="assets/css/popup.css">

</head>

<body>

    <!-- ==========================
            BACKGROUND
    =========================== -->

    <div class="background">

        <div class="blob blob1"></div>

        <div class="blob blob2"></div>

        <div class="noise"></div>

    </div>

    <div id="focus-overlay"></div>

    <!-- ===========================
            CHARACTER LAYER
    =========================== -->

    <div id="character-layer">

        <div id="character-wrapper">

            <div id="character-bubble">

                <div id="bubble-content">

                    <div id="bubble-text"></div>

                    <div id="typing-indicator">

                        <span></span>

                        <span></span>

                        <span></span>

                    </div>

                </div>

            </div>

            <img

                id="character-image"

                src="assets/emoji/mochi/happy.png"

                alt="Mochi">

        </div>

    </div>

    <!-- ==========================
            FLOATING LAYER
    =========================== -->

    <div id="floating-layer">

        <div id="music-player-placeholder"></div>

        <div id="journey-progress-placeholder"></div>

    </div>

    <!-- ==========================
            STORY
    =========================== -->

    <div class="mobile-warning">

        <div>

            💻

            <h2>

                Website ini dibuat khusus untuk Desktop.

            </h2>

            <p>

                Silakan buka menggunakan Laptop atau PC ya ❤️

            </p>

        </div>

    </div>

    <main id="story">

        <div id="transition-overlay">

            <div class="transition-text">

                <h2 id="transition-title"></h2>

                <p id="transition-subtitle"></p>

            </div>

        </div>

        <section id="login-scene" class="scene active">
            <div class="container">

                <div class="login-layout">

                    <div id="login-card" class="login-card glass-card">

                        <h1>Helloo ❤️</h1>

                        <p>
                            Selamat datang di tempat kecil yang aku buat khusus untukmu.
                        </p>

                        <div class="input-group">

                            <input
                                id="username"
                                placeholder=" "
                                type="text"
                                required>

                            <label for="username">

                                Nama Kamu

                            </label>

                        </div>

                        <div class="input-group">

                            <input
                                id="password"
                                placeholder=" "
                                type="password"
                                required>

                            <label for="password">

                                Tanggal Awal Kenal

                            </label>

                        </div>

                        <button id="login-btn">

                            Masuk

                        </button>

                    </div>

                </div>

            </div>
        </section>

        <section id="welcome-scene" class="scene">

            <div id="welcome-wrapper">

                <div id="envelope-stage">

                    <img
                        id="letter"
                        src="assets/img/envelope/letter.png"
                    >

                    <img
                        id="envelope"
                        src="assets/img/envelope/closed.png"
                    >

                </div>

                <div id="welcome-card" class="glass-card">

                    <img
                        id="card-letter"
                        src="assets/img/envelope/hover.png"
                        alt="">

                    <h1>Untuk Kamu ❤️</h1>

                    <p>
                        Ada sesuatu yang ingin aku tunjukkan...
                    </p>

                    <button id="start-story">
                        Mulai Perjalanan ❤️
                    </button>

                </div>

            </div>

        </section>

        <section id="gallery-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="letter-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="question-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="ending-scene" class="scene">
            <div class="container"></div>
        </section>

    </main>

    <!-- ===================================
    POPUP ENGINE
    =================================== -->

    <div id="popup-overlay">

        <div id="popup-card" class="glass-card">

            <img

                id="popup-character"

                src="assets/emoji/mochi/happy.png"

                alt="Mochi">

            <h2 id="popup-title">

                Judul

            </h2>

            <p id="popup-message">

                Lorem ipsum dolor sit amet.

            </p>

            <button id="popup-button">

                Oke ❤️

            </button>

        </div>

    </div>

<script src="assets/data/dialogs.js"></script>

<script src="assets/data/stories.js"></script>

<script src="assets/data/gallery.js"></script>

<script src="assets/data/popup.js"></script>

<script src="assets/data/playlist.js"></script>

<script src="assets/js/config.js"></script>

<script src="assets/js/character.js"></script>

<script src="assets/js/popup.js"></script>

<script src="assets/js/scene.js"></script>

<script src="assets/js/storage.js"></script>

<script src="assets/js/envelope.js"></script>

<script src="assets/js/login.js"></script>

<script src="assets/js/app.js"></script>

</body>

</html>
