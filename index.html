<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>❤️ For U</title>

    <!-- FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="assets/css/style.css">

    <link rel="stylesheet"
          href="assets/css/animations.css">

</head>

<body>

    <!-- ==========================
            BACKGROUND
    =========================== -->

    <div class="background">

        <div class="blob blob1"></div>

        <div class="blob blob2"></div>

        <div class="noise"></div>

    </div>

    <!-- ===========================
            CHARACTER LAYER
    =========================== -->

    <div id="character-layer">

        <div id="character-wrapper">

            <div id="character-bubble">

                <div id="bubble-text">

                    Haiii ❤️

                </div>

            </div>

            <img

                id="character-image"

                src="assets/emoji/mochi/happy.png"

                alt="Mochi">

        </div>

    </div>

    <!-- ==========================
            FLOATING LAYER
    =========================== -->

    <div id="floating-layer">

        <div id="music-player-placeholder"></div>

        <div id="journey-progress-placeholder"></div>

    </div>

    <!-- ==========================
            STORY
    =========================== -->

    <div class="mobile-warning">

        <div>

            💻

            <h2>

                Website ini dibuat khusus untuk Desktop.

            </h2>

            <p>

                Silakan buka menggunakan Laptop atau PC ya ❤️

            </p>

        </div>

    </div>

    <main id="story">

        <section id="loading-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="login-scene" class="scene">
            <div class="container">

                <div class="login-layout">

                    <div class="login-card glass-card">

                        <h1>For You ❤️</h1>

                        <p>
                            Selamat datang di tempat kecil yang aku buat khusus untukmu.
                        </p>

                        <input
                            id="username"
                            type="text"
                            placeholder="Masukkan nama kamu">

                        <input
                            id="password"
                            type="password"
                            placeholder="Tanggal pertama kita bertemu">

                        <button id="login-btn">

                            Masuk

                        </button>

                    </div>

                </div>

            </div>
        </section>

        <section id="welcome-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="gallery-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="letter-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="question-scene" class="scene">
            <div class="container"></div>
        </section>

        <section id="ending-scene" class="scene">
            <div class="container"></div>
        </section>

    </main>

</body>

</html>
